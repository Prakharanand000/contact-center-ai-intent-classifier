<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Center AI — Intent Classifier</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f7ef8;
      --accent2: #7c5cfc;
      --green: #22d3a5;
      --yellow: #f5a623;
      --red: #f25c5c;
      --text: #e8eaf6;
      --muted: #7b82a8;
      --font: 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .badge {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: var(--green);
      display: flex; align-items: center; gap: 6px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 32px;
      gap: 24px;
    }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 16px; }

    /* ── Input area ── */
    .input-wrap { position: relative; }
    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color .2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    /* ── Quick examples ── */
    .examples-label { font-size: 11px; color: var(--muted); font-weight: 500; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      color: var(--muted);
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Session toggle ── */
    .session-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--muted);
    }
    .toggle {
      position: relative; width: 36px; height: 20px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .slider {
      position: absolute; inset: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: .2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 2px;
      background: var(--muted);
      border-radius: 50%;
      transition: .2s;
    }
    .toggle input:checked + .slider { background: var(--accent); border-color: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(16px); background: #fff; }
    #session-id-display { font-size: 11px; color: var(--accent); font-family: monospace; }

    /* ── Submit button ── */
    button.submit {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      width: 100%;
    }
    button.submit:hover { opacity: .88; }
    button.submit:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Results ── */
    .result-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); font-size: 13px;
    }
    .result-empty .icon { font-size: 36px; opacity: .3; }

    .intent-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .intent-label {
      font-size: 11px; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px;
    }
    .intent-name {
      font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
      color: var(--accent);
    }
    .intent-source {
      margin-top: 4px; font-size: 11px; color: var(--muted);
    }
    .intent-source span { color: var(--yellow); }

    /* Confidence bar */
    .conf-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
    .conf-label { font-size: 12px; color: var(--muted); width: 80px; }
    .conf-bar-wrap { flex: 1; background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; }
    .conf-bar {
      height: 100%; border-radius: 4px;
      transition: width .5s ease;
      background: linear-gradient(90deg, var(--accent), var(--green));
    }
    .conf-bar.low { background: linear-gradient(90deg, var(--yellow), var(--red)); }
    .conf-pct { font-size: 13px; font-weight: 600; width: 44px; text-align: right; }

    /* Top 3 */
    .top3-list { display: flex; flex-direction: column; gap: 6px; }
    .top3-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px;
    }
    .top3-intent { flex: 1; color: var(--text); }
    .top3-bar-wrap { width: 100px; background: var(--bg); border-radius: 3px; height: 5px; overflow: hidden; }
    .top3-bar { height: 100%; border-radius: 3px; background: var(--accent); opacity: .6; }
    .top3-pct { font-size: 11px; color: var(--muted); width: 38px; text-align: right; }

    /* Dialog state */
    .state-row {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .state-pill {
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      border: 1px solid;
    }
    .state-greeting   { color: var(--accent);  border-color: var(--accent);  background: rgba(79,126,248,.1); }
    .state-in_progress{ color: var(--yellow);  border-color: var(--yellow);  background: rgba(245,166,35,.1); }
    .state-resolved   { color: var(--green);   border-color: var(--green);   background: rgba(34,211,165,.1); }
    .state-escalate   { color: var(--red);     border-color: var(--red);     background: rgba(242,92,92,.1); }

    .meta-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .meta-cell {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .meta-cell .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .meta-cell .v { font-size: 16px; font-weight: 700; margin-top: 3px; }

    /* Retrieval examples */
    .retrieval-list { display: flex; flex-direction: column; gap: 8px; }
    .retrieval-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
    }
    .retrieval-item .r-text { color: var(--text); margin-bottom: 4px; }
    .retrieval-item .r-meta { color: var(--muted); display: flex; gap: 12px; }
    .retrieval-item .r-label { color: var(--accent); }

    /* History */
    .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto; }
    .history-item {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 12px;
    }
    .h-turn { color: var(--muted); min-width: 16px; }
    .h-text { color: var(--text); flex: 1; }
    .h-intent { color: var(--accent); font-weight: 600; }
    .h-conf { color: var(--muted); }

    /* Error */
    .error-box {
      background: rgba(242,92,92,.1);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--red);
    }

    /* Spinner */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider label */
    .section-label {
      font-size: 11px; color: var(--muted);
      font-weight: 600; text-transform: uppercase;
      letter-spacing: .6px;
    }

    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">🎯</div>
  <div>
    <h1>Contact Center AI — Intent Classifier</h1>
    <p>BERT fine-tuned on CLINC150 · Hybrid BM25 + Dense Retrieval · Dialog State Tracking</p>
  </div>
  <div class="badge" id="status-badge">
    <span class="dot"></span> Connecting...
  </div>
</header>

<main>

  <!-- LEFT: Input panel -->
  <div class="panel">
    <div class="panel-header">📝 Customer Utterance</div>
    <div class="panel-body">

      <div class="input-wrap">
        <textarea id="utterance" placeholder="Type a customer support message…&#10;e.g. I need to check the status of my recent order"></textarea>
      </div>

      <div>
        <div class="examples-label" style="margin-bottom:8px">Quick examples</div>
        <div class="chips" id="chips"></div>
      </div>

      <div class="session-row">
        <label class="toggle">
          <input type="checkbox" id="session-toggle" />
          <span class="slider"></span>
        </label>
        <span>Multi-turn session</span>
        <span id="session-id-display"></span>
        <button onclick="resetSession()" style="margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">Reset</button>
      </div>

      <button class="submit" id="submit-btn" onclick="classify()">
        Classify Intent
      </button>

    </div>
  </div>

  <!-- RIGHT: Results panel -->
  <div class="panel">
    <div class="panel-header">📊 Prediction Results</div>
    <div class="panel-body" id="results-body">
      <div class="result-empty">
        <div class="icon">🤖</div>
        <div>Run a prediction to see results</div>
      </div>
    </div>
  </div>

</main>

<script>
const API = "http://localhost:8000";
let sessionId = null;
let turnHistory = [];

const EXAMPLES = [
  "What's the status of my order?",
  "I'd like to cancel my subscription",
  "How do I reset my password?",
  "I was charged twice for the same item",
  "What are your store hours near me?",
  "I never received my package",
  "Can I get a refund for this product?",
  "How do I update my billing address?",
  "My account got locked out",
  "I want to check my balance",
];

// Render chips
const chipsEl = document.getElementById("chips");
EXAMPLES.forEach(ex => {
  const c = document.createElement("div");
  c.className = "chip";
  c.textContent = ex;
  c.onclick = () => { document.getElementById("utterance").value = ex; };
  chipsEl.appendChild(c);
});

// Health check
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const badge = document.getElementById("status-badge");
    if (r.ok) {
      badge.innerHTML = '<span class="dot"></span> API Online';
      badge.style.color = "var(--green)";
    } else {
      badge.innerHTML = '⚠ API Error';
      badge.style.color = "var(--red)";
    }
  } catch {
    const badge = document.getElementById("status-badge");
    badge.innerHTML = '🔴 API Offline — run uvicorn locally';
    badge.style.color = "var(--red)";
  }
}
checkHealth();

function resetSession() {
  sessionId = null;
  turnHistory = [];
  document.getElementById("session-id-display").textContent = "";
  document.getElementById("results-body").innerHTML = `
    <div class="result-empty">
      <div class="icon">🔄</div>
      <div>Session reset</div>
    </div>`;
}

async function classify() {
  const text = document.getElementById("utterance").value.trim();
  if (!text) return;

  const useSession = document.getElementById("session-toggle").checked;
  const btn = document.getElementById("submit-btn");
  btn.disabled = true;

  document.getElementById("results-body").innerHTML = `<div style="display:flex;align-items:center;justify-content:center;flex:1"><div class="spinner"></div></div>`;

  try {
    const body = { text };
    if (useSession && sessionId) body.session_id = sessionId;

    const res = await fetch(`${API}/predict`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });

    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();

    if (useSession) {
      sessionId = data.session_id;
      document.getElementById("session-id-display").textContent = sessionId.slice(0, 8) + "…";
      turnHistory.push({ text, intent: data.prediction.intent, confidence: data.prediction.confidence });
    }

    renderResults(data);
  } catch (e) {
    document.getElementById("results-body").innerHTML = `<div class="error-box">❌ ${e.message}<br><small>Make sure the API is running: <code>uvicorn api.main:app --reload --port 8000</code></small></div>`;
  } finally {
    btn.disabled = false;
  }
}

function renderResults(data) {
  const p = data.prediction;
  const confPct = (p.confidence * 100).toFixed(1);
  const isLow = p.low_confidence;

  const top3HTML = p.top3.map(([intent, score], i) => `
    <div class="top3-item">
      <span style="color:var(--muted);font-size:11px">#${i+1}</span>
      <span class="top3-intent">${intent.replace(/_/g, " ")}</span>
      <div class="top3-bar-wrap"><div class="top3-bar" style="width:${(score*100).toFixed(0)}%"></div></div>
      <span class="top3-pct">${(score*100).toFixed(1)}%</span>
    </div>`).join("");

  const retrievalHTML = (p.retrieved_examples && p.retrieved_examples.length)
    ? `<div class="section-label">Retrieval Fallback Examples</div>
       <div class="retrieval-list">${p.retrieved_examples.slice(0,3).map(r => `
         <div class="retrieval-item">
           <div class="r-text">"${r.text}"</div>
           <div class="r-meta">
             <span class="r-label">${r.label.replace(/_/g," ")}</span>
             <span>hybrid: ${(r.hybrid_score*100).toFixed(0)}%</span>
             <span>dense: ${(r.dense_score*100).toFixed(0)}%</span>
           </div>
         </div>`).join("")}
       </div>` : "";

  const stateClass = `state-${data.dialog_state}`;
  const stateLabel = data.dialog_state.replace(/_/g, " ");

  const historyHTML = turnHistory.length > 1
    ? `<div class="section-label">Turn History</div>
       <div class="history-list">${turnHistory.map((t,i) => `
         <div class="history-item">
           <span class="h-turn">${i+1}</span>
           <span class="h-text">${t.text}</span>
           <span class="h-intent">${t.intent.replace(/_/g," ")}</span>
           <span class="h-conf">${(t.confidence*100).toFixed(0)}%</span>
         </div>`).join("")}
       </div>` : "";

  document.getElementById("results-body").innerHTML = `
    <div class="intent-card">
      <div class="intent-label">Predicted Intent</div>
      <div class="intent-name">${p.intent.replace(/_/g, " ")}</div>
      <div class="intent-source">
        Source: <span>${p.source === "bert" ? "BERT classifier" : "⚡ Retrieval fallback"}</span>
        ${isLow ? ' · <span style="color:var(--red)">Low confidence</span>' : ''}
      </div>
      <div class="conf-row">
        <span class="conf-label">Confidence</span>
        <div class="conf-bar-wrap">
          <div class="conf-bar ${isLow ? 'low' : ''}" style="width:${confPct}%"></div>
        </div>
        <span class="conf-pct" style="color:${isLow ? 'var(--yellow)' : 'var(--green)'}">${confPct}%</span>
      </div>
    </div>

    <div class="section-label">Top 3 Predictions</div>
    <div class="top3-list">${top3HTML}</div>

    <div class="section-label">Dialog State</div>
    <div class="state-row">
      <div class="state-pill ${stateClass}">${stateLabel}</div>
    </div>
    <div class="meta-grid">
      <div class="meta-cell"><div class="k">Turn</div><div class="v">#${data.turn_count}</div></div>
      <div class="meta-cell"><div class="k">Avg Handle Turns</div><div class="v" style="color:var(--green)">${data.avg_handle_turns.toFixed(1)}</div></div>
      <div class="meta-cell"><div class="k">Resolved</div><div class="v" style="color:${data.resolved?'var(--green)':'var(--muted)'}">${data.resolved ? "Yes ✓" : "No"}</div></div>
      <div class="meta-cell"><div class="k">Escalate</div><div class="v" style="color:${data.escalate?'var(--red)':'var(--muted)'}">${data.escalate ? "Yes ⚠" : "No"}</div></div>
    </div>

    ${retrievalHTML}
    ${historyHTML}
  `;
}

// Enter key to submit
document.getElementById("utterance").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); classify(); }
});
</script>

</body>
</html>
